<?xml version="1.0" encoding="utf-8"?>
<odoo>

    <!-- Acción de servidor disponible en lista y formulario de account.move -->
    <record id="action_server_add_to_settlement" model="ir.actions.server">
        <field name="name">Agregar a Liquidación</field>
        <field name="model_id" ref="account.model_account_move"/>
        <field name="binding_model_id" ref="account.model_account_move"/>
        <field name="binding_view_types">list,form</field>
        <field name="state">code</field>
        <field name="code">
if records:
    action = records.action_add_to_settlement()
</field>
    </record>

    <!-- Herencia del formulario de account.move para añadir el botón -->
    <record id="view_account_move_form_inherit_ktx" model="ir.ui.view">
        <field name="name">account.move.form.ktx.expense_management</field>
        <field name="model">account.move</field>
        <field name="inherit_id" ref="account.view_move_form"/>
        <field name="arch" type="xml">
            <!-- Añadimos antes del statusbar, que es el último elemento del header -->
            <xpath expr="//header/field[@widget='statusbar']" position="before">
                <button name="action_add_to_settlement"
                    string="Agregar a Liquidación"
                    type="object"
                    class="btn-secondary"
                    invisible="(move_type != 'in_invoice' and move_type != 'entry') or state != 'posted'"/>
            </xpath>
        </field>
    </record>

</odoo>
